name: CI

on:
  pull_request:
    branches:
      - main

    

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependenciesg
        run: uv sync --all-extras --dev

      - name: Linting And Formating Check
        run: |
          uv run ruff check . 
          uv run ruff format --check .

      - name: Testing
        run: uv run pytest
